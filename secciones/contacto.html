
<!-- FORMULARIO DE CONTACTO -->
<div style="max-width:560px; margin:2rem auto;">
  <div style="margin-bottom:1rem; font-family: 'Agatho', sans-serif;">
    <label for="from_name" style="font-family: 'Agatho', sans-serif;">Nombre</label>
    <input type="text" id="from_name" placeholder="Tu nombre" style="width:100%; box-sizing:border-box; font-family: 'Agatho', sans-serif;" />
  </div>
  <div style="margin-bottom:1rem; font-family: 'Agatho', sans-serif;">
    <label for="from_email" style="font-family: 'Agatho', sans-serif;">Correo electrónico</label>
    <input type="email" id="from_email" placeholder="tu@correo.com" style="width:100%; box-sizing:border-box; font-family: 'Agatho', sans-serif;" />
  </div>
  <div style="margin-bottom:1rem;">
    <label for="subject" style="font-family: 'Agatho', sans-serif;">Asunto</label>
    <input type="text" id="subject" placeholder="Asunto" style="width:100%; box-sizing:border-box; font-family: 'Agatho', sans-serif;" />
  </div>
  <div style="margin-bottom:1rem;">
    <label for="message" style="font-family: 'Agatho', sans-serif;">Mensaje</label>
    <textarea id="message" placeholder="Escribe tu mensaje..." style="width:100%; box-sizing:border-box; min-height:140px; font-family: 'Agatho', sans-serif;"></textarea>
  </div>
 
  <button onclick="sendEmail()" id="sendBtn" style="width:100%; padding:10px; cursor:pointer; font-family: 'Agatho', sans-serif;">
    Enviar mensaje
  </button>
  <div id="statusMsg" style="margin-top:10px; padding:10px; border-radius:6px; display:none;"></div>
</div>
